<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="login-container">
    <div class="login-box">

       <h2>
    	Bem-vindo ao Dashboard 
    	<span style="color:#243b55;" th:text="${nome}"></span>
		</h2>

        <strong>Usuário</strong>
        <div class="input-group">
            <button onclick="window.location.href='/perfil'">
                Meu Perfil
            </button>
        </div>

        <div class="input-group" th:if="${role == 'USER'}">
   			 <button onclick="window.location.href='/tickets'">
       			 Meus Tickets
    		</button>
		</div>

		<div class="input-group" th:if="${role == 'ADMIN'}">
    		<button onclick="window.location.href='/tickets'">
       			 Tickets
    		</button>
		</div>
		<div class="input-group" th:if="${role == 'ADMIN'}">
			<a th:href="@{/admin/usuarios}">
			<button>Gerenciar Usuários</button>
			</a>
		</div>

        <div class="input-group">
            <button onclick="window.location.href='/configs'">
                Configurações
            </button>
        </div>

   <div class="input-group">
    <button onclick="window.location.href='/sair'">
        Sair
    </button>
</div>

    </div>
</div>

</body>
</html>
